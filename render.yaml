services:
  - type: web
    name: mlflow-tracking-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    
    # Plan Render
    plan: free
    region: frankfurt

    # Health check
    healthCheckPath: /health
    
    # ── Environment vars ───────────────────────────────────────────────
    envVars:
      - key: DATABASE_URL
        sync: false 

      - key: MLFLOW_S3_BUCKET
        sync: false

      # Endpoint R2 
      - key: MLFLOW_S3_ENDPOINT_URL
        sync: false

      # Credentials R2 
      - key: AWS_ACCESS_KEY_ID
        sync: false

      - key: AWS_SECRET_ACCESS_KEY
        sync: false

      # BOTO3 required
      - key: AWS_DEFAULT_REGION
        value: auto

    # ── Logging ─────────────────────────────────────────────────────
      
      - key: MLFLOW_LOGGING_LEVEL
        value: WARNING 

      - key: MLFLOW_TRACKING_INSECURE_TLS
        value: "false"
      
      - key: SCARF_NO_ANALYTICS
        value: "true"
      
      - key: DO_NOT_TRACK
        value: "1"